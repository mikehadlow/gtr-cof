<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, user-scalable=0, minimum-scale=1.0, maximum-scale=1.0"
        />
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black" />
        <title>Guitar Dashboard</title>
        <meta
            name="description"
            content="A free, open source, music theory explorer for guitarists. Discover how scales and modes map to the fretboard and how chords work within scales."
        />
        <link rel="canonical" href="https://guitardashboard.com/" />
        <link href="gtr-cof.css" rel="stylesheet" />
        <link rel="shortcut icon" href="favicon.ico?r=31241" />
    </head>

    <body>
        <nav class="header">
            <div class="menu"><h1 class="title">Guitar Dashboard</h1></div>
            <div class="dropdown">
                <div class="menu">
                    <svg class="menu-bar-icon" width="24" height="24">
                        <use href="#icon-info" />
                    </svg>
                </div>
                <div class="dropdown-content with-padding">
                    <p>
                        An interactive music theory dashboard, including a
                        <a href="https://en.wikipedia.org/wiki/Circle_of_fifths"
                            >circle of fifths</a
                        >
                        for guitarists.
                    </p>
                    <p>
                        Discover how scales and modes map to the fretboard and
                        how chords work within scales.
                    </p>
                    <p>Watch the video:</p>
                    <iframe
                        width="560"
                        height="315"
                        src="https://www.youtube.com/embed/JPcEvxoWTJM"
                        frameborder="0"
                        allow="autoplay; encrypted-media"
                        allowfullscreen
                    >
                    </iframe>
                </div>
            </div>
            <div class="dropdown">
                <div class="menu">Tunings</div>
                <div id="tuning-dropdown" class="dropdown-content"></div>
            </div>
            <div class="dropdown">
                <div class="menu">Settings</div>
                <div id="settings-dropdown" class="dropdown-content">
                    <div class="with-padding">
                        <input
                            type="checkbox"
                            id="left-handed-checkbox"
                            name="left_handed"
                        />
                        <label for="left-handed-checkbox"
                            >Left Handed Fretboard</label
                        ><br />
                        <input
                            type="checkbox"
                            id="flip-nut-checkbox"
                            name="flip_nut"
                        />
                        <label for="flip-nut-checkbox">Flip Nut</label><br />
                        <input
                            type="checkbox"
                            id="set-c-to-noon-checkbox"
                            name="set_c_to_noon"
                            checked
                        />
                        <label for="set-c-to-noon-checkbox"
                            >Set C To Noon</label
                        >
                    </div>
                    <div class="with-padding">
                        <fieldset>
                            <label>Fretboard note labels:</label><br />
                            <input
                                type="radio"
                                name="fb-note-text"
                                id="fb-note-text-None"
                                value="None"
                            />
                            None <br />
                            <input
                                type="radio"
                                name="fb-note-text"
                                id="fb-note-text-NoteName"
                                value="NoteName"
                            />
                            Note names <br />
                            <input
                                type="radio"
                                name="fb-note-text"
                                id="fb-note-text-Interval"
                                value="Interval"
                            />
                            Intervals
                        </fieldset>
                    </div>
                </div>
            </div>
            <div class="dropdown">
                <div class="menu">
                    <svg class="menu-bar-icon" width="24" height="24">
                        <use href="#icon-share" />
                    </svg>
                </div>
                <div id="permalink-dropdown" class="dropdown-content">
                    <div class="with-padding">
                        <input
                            type="button"
                            id="permalink-button"
                            value="Generate Permalink"
                        />
                        <br />
                        <br />
                        <input type="input" id="permalink-text" />
                    </div>
                </div>
            </div>
            <div id="speaker-btn" class="menu" style="margin-left: auto">
                <svg class="menu-bar-icon" width="24" height="24">
                    <use id="speaker-icon" href="#icon-speaker-wave" />
                </svg>
            </div>
            <div id="bluesky-link" class="menu">
                <a
                    href="https://bsky.app/profile/mikehadlow.com"
                    target="_blank"
                    rel="noopener noreferrer"
                >
                    <svg class="menu-bar-icon" width="24" height="24">
                        <use id="bluesky-icon" href="#icon-bluesky" />
                    </svg>
                </a>
            </div>
            <div id="github-link" class="menu">
                <a
                    href="https://github.com/mikehadlow/gtr-cof"
                    target="_blank"
                    rel="noopener noreferrer"
                >
                    <svg class="menu-bar-icon" width="24" height="24">
                        <use id="github-icon" href="#icon-github" />
                    </svg>
                </a>
            </div>
        </nav>
        <!-- end of header-->
        <!-- https://css-tricks.com/scale-svg/ -->

</html>
